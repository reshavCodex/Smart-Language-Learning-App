<!DOCTYPE html>
<html>

<head>
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Signup</h1>

    <input id="signupUsername" placeholder="Username">

    <input
      id="signupPassword"
      type="password"
      placeholder="Password"
    >

    <input
      id="nativeLanguage"
      placeholder="Native Language"
    >

    <input
      id="learningLanguage"
      placeholder="Learning Language"
    >

    <button onclick="signup()">
      Signup
    </button>

  </div>

  <script src="script.js"></script>

</body>
</html>
